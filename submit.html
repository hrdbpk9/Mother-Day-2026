<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งความรักถึงแม่ | BPK 9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=Sarabun:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg-top:#cfe8f7; --color-bg-bottom:#eaf5fb;
    --color-navy:#1f3a5f; --color-blue:#4f8fc4; --color-rose:#e0524f;
    --color-ink:#2b3a42; --color-ink-soft:#5b6b71; --color-line:#dbe8ea;
    --fs-2xs:0.72rem; --fs-xs:0.84rem; --fs-sm:0.94rem; --fs-md:1.05rem; --fs-lg:1.3rem; --fs-xl:1.7rem;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; font-family:'Noto Sans Thai','Sarabun','Leelawadee UI',Tahoma,sans-serif;
    color:var(--color-ink);
    background:linear-gradient(180deg, var(--color-bg-top) 0%, var(--color-bg-bottom) 60%);
    display:flex; justify-content:center; padding:26px 16px 50px;
  }
  .card{width:100%; max-width:440px;}
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .brand img{height:34px;}
  .brand span{font-size:var(--fs-2xs); color:var(--color-ink-soft); line-height:1.3;}
  .brand span strong{display:block; color:var(--color-navy); font-size:var(--fs-xs); font-weight:700;}

  h1{font-family:'Noto Serif Thai'; color:var(--color-navy); font-size:var(--fs-xl); margin:0 0 6px; text-align:center;}
  p.sub{text-align:center; color:var(--color-ink-soft); font-size:var(--fs-sm); margin:0 0 22px; line-height:1.6;}

  .box{background:#fff; border-radius:20px; padding:22px 20px; box-shadow:0 16px 34px -20px rgba(31,58,95,0.4);}
  label{display:block; font-size:var(--fs-xs); color:var(--color-ink-soft); margin-bottom:6px; font-weight:600;}
  .field{margin-bottom:18px;}
  input[type=text], textarea{
    width:100%; border:1px solid var(--color-line); border-radius:12px; padding:12px 14px;
    font-family:inherit; font-size:var(--fs-md); color:var(--color-ink); background:#fbfdfa; resize:vertical;
  }
  input[type=text]:focus, textarea:focus{outline:none; border-color:var(--color-blue); box-shadow:0 0 0 3px rgba(79,143,196,0.15);}
  textarea{min-height:110px; line-height:1.6;}
  .field-foot{display:flex; justify-content:flex-end; margin-top:4px;}
  .char-count{font-size:var(--fs-2xs); color:var(--color-ink-soft);}
  .char-count.warn{color:var(--color-rose);}

  .photo-picker{
    border:2px dashed var(--color-line); border-radius:14px; padding:18px; text-align:center;
    color:var(--color-ink-soft); font-size:var(--fs-xs); cursor:pointer; position:relative; transition:border-color .2s, background .2s;
  }
  .photo-picker.has-image{border-style:solid; padding:10px;}
  .photo-picker:hover{border-color:var(--color-blue);}
  .photo-picker input{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .photo-picker .hint-icon{font-size:1.6rem; display:block; margin-bottom:6px;}
  .preview-wrap{position:relative; display:none;}
  .preview-wrap.show{display:block;}
  .preview-wrap img{width:100%; max-height:260px; object-fit:cover; border-radius:10px; display:block;}
  .remove-photo{
    position:absolute; top:8px; right:8px; background:rgba(43,58,66,0.75); color:#fff; border:none;
    border-radius:999px; width:28px; height:28px; font-size:0.9rem; cursor:pointer; line-height:1;
  }
  .optional-tag{font-weight:400; color:var(--color-ink-soft); font-size:var(--fs-2xs);}

  button.submit{
    appearance:none; border:none; cursor:pointer; width:100%; margin-top:8px;
    background:linear-gradient(135deg, var(--color-rose), #c73f42); color:#fff;
    font-family:'Noto Sans Thai'; font-weight:700; font-size:var(--fs-md);
    padding:14px 20px; border-radius:999px; box-shadow:0 10px 20px -10px rgba(224,82,79,0.7);
  }
  button.submit:disabled{opacity:0.6; cursor:not-allowed;}
  .form-status{text-align:center; font-size:var(--fs-xs); color:var(--color-navy); font-weight:600; min-height:1.3em; margin-top:12px;}
  .form-status.error{color:var(--color-rose);}

  .success{display:none; text-align:center; padding:30px 10px;}
  .success.show{display:block;}
  .success .emoji{font-size:2.6rem; display:block; margin-bottom:10px;}
  .success h2{font-family:'Noto Serif Thai'; color:var(--color-navy); font-size:var(--fs-lg); margin:0 0 8px;}
  .success p{color:var(--color-ink-soft); font-size:var(--fs-sm); margin:0 0 20px; line-height:1.6;}
  .success button{
    appearance:none; border:1px solid var(--color-line); background:#fff; color:var(--color-navy);
    font-family:inherit; font-weight:700; font-size:var(--fs-sm); padding:10px 24px; border-radius:999px; cursor:pointer;
  }

  .demo-banner{margin:0 0 16px; text-align:center; background:#fff7e6; border:1px solid #eecf8a; color:#8a6a12; font-size:var(--fs-2xs); padding:8px 14px; border-radius:999px;}
</style>
</head>

      <div class="field">
        <label>แนบรูปคู่กับคุณแม่ <span class="optional-tag">(ไม่แนบก็ได้)</span></label>
        <label class="photo-picker" id="photoPicker">
          <span class="hint-icon">📷</span>
          <span id="pickerText">แตะเพื่อถ่ายรูป หรือเลือกจากคลังภาพ</span>
          <input type="file" id="photoInput" accept="image/*">
        </label>
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" alt="ตัวอย่างรูปที่แนบ">
          <button type="button" class="remove-photo" id="removePhoto" aria-label="ลบรูปภาพ">✕</button>
        </div>
      </div>
      <button type="submit" class="submit" id="submitBtn">ติดสติกเกอร์ 💙</button>
      <div class="form-status" id="formStatus"></div>
    </form>

    <div class="success" id="successBox">
      <span class="emoji">🎉</span>
      <h2>ส่งเรียบร้อยแล้ว!</h2>
      <p>ข้อความของคุณกำลังจะขึ้นจอ ขอบคุณที่ร่วมบอกรักแม่นะคะ/ครับ</p>
      <button id="sendAnother">ส่งอีกข้อความ</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwQeBFeJY17er-c8bNOs3gVMWchxvLe_nntLaSqxcqy0vVZHl7LxobgZslWW8tAUmwf/exec",
  MAX_IMAGE_DIMENSION: 900,
  IMAGE_QUALITY: 0.65
};
const DEMO_MODE = !CONFIG.SCRIPT_URL;
document.getElementById('demoBanner').style.display = DEMO_MODE ? 'block' : 'none';

const form = document.getElementById('msgForm');
const msgInput = document.getElementById('msgInput');
const nameInput = document.getElementById('nameInput');
const charCount = document.getElementById('charCount');
const submitBtn = document.getElementById('submitBtn');
const formStatus = document.getElementById('formStatus');
const photoInput = document.getElementById('photoInput');
const photoPicker = document.getElementById('photoPicker');
const pickerText = document.getElementById('pickerText');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const removePhoto = document.getElementById('removePhoto');
const successBox = document.getElementById('successBox');

let compressedImage = null; // {dataUrl, mime}

msgInput.addEventListener('input', () => {
  const len = msgInput.value.length;
  charCount.textContent = `${len}/200`;
  charCount.classList.toggle('warn', len > 180);
});

photoInput.addEventListener('change', async () => {
  const file = photoInput.files[0];
  if(!file) return;
  formStatus.textContent = 'กำลังเตรียมรูปภาพ…';
  formStatus.classList.remove('error');
  try{
    compressedImage = await compressImage(file, CONFIG.MAX_IMAGE_DIMENSION, CONFIG.IMAGE_QUALITY);
    previewImg.src = compressedImage.dataUrl;
    previewWrap.classList.add('show');
    photoPicker.classList.add('has-image');
    pickerText.textContent = 'เปลี่ยนรูป';
    formStatus.textContent = '';
  }catch(err){
    console.error(err);
    formStatus.classList.add('error');
    formStatus.textContent = 'แนบรูปไม่สำเร็จ ลองใหม่อีกครั้ง';
  }
});

removePhoto.addEventListener('click', () => {
  compressedImage = null;
  photoInput.value = '';
  previewWrap.classList.remove('show');
  photoPicker.classList.remove('has-image');
  pickerText.textContent = 'แตะเพื่อถ่ายรูป หรือเลือกจากคลังภาพ';
});

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if(width > height && width > maxDim){ height = Math.round(height * maxDim/width); width = maxDim; }
      else if(height > maxDim){ width = Math.round(width * maxDim/height); height = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve({ dataUrl, mime: 'image/jpeg' });
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = msgInput.value.trim();
  const name = nameInput.value.trim() || 'ไม่ระบุชื่อ';
  if(!message && !compressedImage){
    formStatus.textContent = 'กรุณาพิมพ์ข้อความ หรือแนบรูปอย่างน้อยหนึ่งอย่าง';
    formStatus.classList.add('error');
    return;
  }
  submitBtn.disabled = true;
  formStatus.classList.remove('error');
  formStatus.textContent = 'กำลังส่ง…';

  try{
    const payload = { name, message };
    if(compressedImage){
      payload.imageBase64 = compressedImage.dataUrl.split(',')[1];
      payload.imageMime = compressedImage.mime;
    }
    if(!DEMO_MODE){
      await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
    }
    form.style.display = 'none';
    successBox.classList.add('show');
  }catch(err){
    console.error(err);
    formStatus.classList.add('error');
    formStatus.textContent = 'ส่งข้อความไม่สำเร็จ กรุณาลองใหม่อีกครั้ง';
  }finally{
    submitBtn.disabled = false;
  }
});

document.getElementById('sendAnother').addEventListener('click', () => {
  form.reset();
  charCount.textContent = '0/200';
  compressedImage = null;
  previewWrap.classList.remove('show');
  photoPicker.classList.remove('has-image');
  pickerText.textContent = 'แตะเพื่อถ่ายรูป หรือเลือกจากคลังภาพ';
  formStatus.textContent = '';
  successBox.classList.remove('show');
  form.style.display = 'block';
});
</script>
</body>
</html>
